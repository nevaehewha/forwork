<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홍작 대동제 판매 데이터</title> <!-- 사이트 명 -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #faf9f6;
    min-height: 100vh;
    padding: 3rem 1.5rem;
    color: #1a1a1a;
  }

  .wrap { max-width: 640px; margin: 0 auto; }

  header { margin-bottom: 3rem; }

  .label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }

  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .drink-btn {
    position: relative;
    border: 1.5px solid #e0ddd6;
    border-radius: 16px;
    background: #fff;
    padding: 1.6rem 1.4rem;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.18s, transform 0.12s, box-shadow 0.18s;
    overflow: hidden;
  }

  .drink-btn:hover {
    border-color: #1a1a1a;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }

  .drink-btn:active { transform: scale(0.97); }

  .drink-btn.flash::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--flash-color, rgba(0,0,0,0.06));
    border-radius: inherit;
    animation: flash 0.35s ease forwards;
  }

  @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }

  .btn-emoji { font-size: 2rem; margin-bottom: 0.6rem; display: block; }
  .btn-name  { font-size: 1rem; font-weight: 600; display: block; margin-bottom: 0.2rem; }
  .btn-sub   { font-size: 0.75rem; color: #999; font-family: 'DM Mono', monospace; }

  .btn-count {
    position: absolute;
    top: 1rem; right: 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    background: #f0ede8;
    padding: 0.2rem 0.55rem;
    border-radius: 20px;
    color: #666;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.78rem;
    color: #bbb;
    margin-bottom: 2rem;
    font-family: 'DM Mono', monospace;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s;
  }

  .status-dot.ok  { background: #22c55e; animation: pulse 2s ease-in-out infinite; }
  .status-dot.err { background: #ef4444; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #bbb;
    margin-bottom: 1rem;
  }

  .table-wrap { border: 1.5px solid #e0ddd6; border-radius: 12px; overflow: hidden; }

  table { width: 100%; border-collapse: collapse; }
  thead { background: #f5f3ef; }

  th {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    padding: 0.7rem 1rem;
    text-align: left;
    font-weight: 500;
  }

  td {
    padding: 0.65rem 1rem;
    font-size: 0.84rem;
    border-top: 1px solid #f0ede8;
    font-family: 'DM Mono', monospace;
    color: #444;
  }

  td.one  { color: #16a34a; font-weight: 500; }
  td.zero { color: #d1d5db; }

  .empty-msg {
    padding: 2rem;
    text-align: center;
    font-size: 0.82rem;
    color: #bbb;
    font-family: 'DM Mono', monospace;
  }

  .toast {
    position: fixed;
    bottom: 2rem; right: 2rem;
    background: #1a1a1a;
    color: #fff;
    padding: 0.7rem 1.2rem;
    border-radius: 10px;
    font-size: 0.84rem;
    font-weight: 500;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    z-index: 99;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <p class="label">음료 주문 기록 시스템</p> <!-- 제목 위 작은 글씨 -->
    <h1>26-1<br>홍작 대동제 카운팅 시스템</h1> <!-- 큰 제목 & <br>은 엔터키 같은 거 -->
  </header>

  <div class="status-bar">
    <span class="status-dot" id="dot"></span>
    <span id="status-text">서버 연결 확인 중...</span> <!-- 서버 연결 안되면 구글 시트에 업로드가 안됩니다 -->
  </div>

  <!-- ✦ 버튼 추가 시: data-item = server.py MENU_ITEMS 항목명과 일치 // 여기서 이름 바꾸면 server.py도 메뉴 아이템 항목 명과 일치하게 수정해야합니다 -->
  <div class="btn-grid">
    <button class="drink-btn" data-item="밀크티1"
            style="--flash-color:rgba(251,146,60,0.18)" onclick="record(this)">
      <span class="btn-emoji">🧋</span>
      <span class="btn-name">밀크티1</span>
      <span class="btn-sub">Milk Tea1</span>
      <span class="btn-count" id="cnt-밀크티1">0회</span>
    </button>

    <button class="drink-btn" data-item="밀크티2"
            style="--flash-color:rgba(120,80,40,0.12)" onclick="record(this)">
      <span class="btn-emoji">☕</span>
      <span class="btn-name">밀크티2</span>
      <span class="btn-sub">cMilk Tea2</span>
      <span class="btn-count" id="cnt-밀크티2">0회</span>
    </button>

<button class="drink-btn" data-item="티칵테일1"
        style="--flash-color:rgba(244,63,94,0.15)" onclick="record(this)">
  <span class="btn-emoji">🍷</span>
  <span class="btn-name">티칵테일1</span>
  <span class="btn-sub">Tea Cocktail1</span>
  <span class="btn-count" id="cnt-티칵테일1">0회</span>
</button>

<button class="drink-btn" data-item="티칵테일2"
        style="--flash-color:rgba(30,30,30,0.15)" onclick="record(this)">
  <span class="btn-emoji">🍹</span>
  <span class="btn-name">티칵테일2</span>
  <span class="btn-sub">Tea Cocktail2</span>
  <span class="btn-count" id="cnt-티칵테일2">0회</span>
</button>

<button class="drink-btn" data-item="오트밀크"
        style="--flash-color:rgba(34,197,94,0.15)" onclick="record(this)">
  <span class="btn-emoji">🥛</span>
  <span class="btn-name">오트밀크</span>
  <span class="btn-sub">Oat Milk</span>
  <span class="btn-count" id="cnt-오트밀크">0회</span>
</button>


    <!-- 취소 같은 경우 값을 지우는게 아니라 그냥 취소 행에 1 입력하게 되어있습니다. 실수로 눌렀을 때 이전 데이터가 지워지는 걸 방지하기 위함입니다. -->
<button class="drink-btn" data-item="취소" 
        style="--flash-color:rgba(200,200,200,0.2)" onclick="record(this)">
  <span class="btn-emoji">❌</span>
  <span class="btn-name">취소</span>
  <span class="btn-sub">Cancel</span>
  <span class="btn-count" id="cnt-취소">0회</span>
</button>

    
  </div>

  <p class="section-title">최근 기록 (Google Sheets 연동)</p> <!-- 아마 최신 기록 20개가 출력될 겁니다 -->
  <div class="table-wrap">
    <div id="table-area">
      <div class="empty-msg">버튼을 누르면 기록이 나타납니다</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  <!-- Railway 배포 후 발급받은 URL로 교체  -->
  const SERVER = 'https://forwork-production.up.railway.app';

  const counts = {};

  async function checkServer() {
    try {
      const r = await fetch(`${SERVER}/health`);
      if (r.ok) {
        setStatus(true);
        loadHistory();
      }
    } catch {
      setStatus(false);
    }
  }

  function setStatus(ok) {
    document.getElementById('dot').className = 'status-dot ' + (ok ? 'ok' : 'err');
    document.getElementById('status-text').textContent =
      ok ? '서버 연결됨 — Google Sheets 연동 중' : '서버 연결 안 됨 (Railway URL 확인 필요)';
  }

  async function record(btn) {
    const item = btn.dataset.item;

    btn.classList.remove('flash');
    void btn.offsetWidth;
    btn.classList.add('flash');

    try {
      const r = await fetch(`${SERVER}/record`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ item })
      });
      const data = await r.json();

      if (data.ok) {
        counts[item] = (counts[item] || 0) + 1;
        const el = document.getElementById('cnt-' + item);
        if (el) el.textContent = counts[item] + '회';
        showToast(`✓ ${item} 기록 완료`);
        loadHistory();
      }
    } catch {
      showToast('⚠ 서버에 연결할 수 없습니다');
      setStatus(false);
    }
  }

  async function loadHistory() {
    try {
      const r = await fetch(`${SERVER}/history`);
      renderTable(await r.json());
    } catch {}
  }

  function renderTable({ headers, rows }) {
    if (!rows || rows.length === 0) return;

    const ths = headers.map(h => `<th>${h}</th>`).join('');
    const trs = rows.map(row => {
      const tds = row.map((v, i) => {
        if (i === 0) return `<td>${v}</td>`;
        const cls = v == 1 ? 'one' : 'zero';
        return `<td class="${cls}">${v}</td>`;
      }).join('');
      return `<tr>${tds}</tr>`;
    }).join('');

    document.getElementById('table-area').innerHTML = `
      <table>
        <thead><tr>${ths}</tr></thead>
        <tbody>${trs}</tbody>
      </table>`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  checkServer();
</script>
</body>
</html>
